name: Build and Publish Containers to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch (main for production, develop for beta)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - develop

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/InstantAIGate.API/InstantAIGate.API.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine image names and tags
        id: tags
        run: |
          if [ "${{ github.event.inputs.target_branch }}" == "develop" ] || [ "${{ github.ref }}" == "refs/heads/main" ] && [ -z "${{ github.event.inputs.target_branch }}" ]; then
            if [ "${{ github.event.inputs.target_branch }}" == "develop" ]; then
              echo "api_image=ghcr.io/instancium/instant-ai-gate-api-beta" >> $GITHUB_OUTPUT
              echo "admin_image=ghcr.io/instancium/instant-ai-gate-admin-beta" >> $GITHUB_OUTPUT
              echo "api_tags=latest,dev,${{ steps.version.outputs.version }}-beta" >> $GITHUB_OUTPUT
              echo "admin_tags=latest,dev,${{ steps.version.outputs.version }}-beta" >> $GITHUB_OUTPUT
            else
              echo "api_image=ghcr.io/instancium/instant-ai-gate-api" >> $GITHUB_OUTPUT
              echo "admin_image=ghcr.io/instancium/instant-ai-gate-admin" >> $GITHUB_OUTPUT
              echo "api_tags=latest,${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
              echo "admin_tags=latest,${{ steps.version.outputs.version }}" >> $GITHUB_OUTPUT
            fi
          else
            echo "api_image=ghcr.io/instancium/instant-ai-gate-api-beta" >> $GITHUB_OUTPUT
            echo "admin_image=ghcr.io/instancium/instant-ai-gate-admin-beta" >> $GITHUB_OUTPUT
            echo "api_tags=latest,dev,${{ steps.version.outputs.version }}-beta" >> $GITHUB_OUTPUT
            echo "admin_tags=latest,dev,${{ steps.version.outputs.version }}-beta" >> $GITHUB_OUTPUT
          fi

      - name: Extract Docker Metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.tags.outputs.api_image }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.api_tags }}

      - name: Extract Docker Metadata for Admin
        id: meta-admin
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.tags.outputs.admin_image }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.admin_tags }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api-runtime
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Admin Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: admin-runtime
          push: true
          tags: ${{ steps.meta-admin.outputs.tags }}
          labels: ${{ steps.meta-admin.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max